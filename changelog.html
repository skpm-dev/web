  <main class="cl-main">

    <div class="cl-hero">

    <div class="cl-tabs-wrap">

  <script>
    const REPOS = {
      cli:      'skpm-dev/cli',
      plugin:   'skpm-dev/plugin',
      registry: 'skpm-dev/registry',
    };

    const cache = {};

    document.querySelectorAll('.cl-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.cl-tab').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-selected', 'false');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');
        showTab(btn.dataset.tab);
      });
    });

    async function showTab(tab) {
      const panel = document.getElementById('cl-panel');
      if (cache[tab]) { panel.innerHTML = cache[tab]; return; }

      panel.innerHTML = '<div class="cl-loading"><span class="cl-spinner"></span>Loading...</div>';

      try {
        const html = await { cli: renderCLI, plugin: renderPlugin, registry: renderRegistry }[tab]();
        cache[tab] = html;
        panel.innerHTML = html;
      } catch (err) {
        panel.innerHTML = `<div class="cl-error">Could not load changelog — ${escapeHtml(err.message)}</div>`;
      }
    }

    async function ghFetch(path) {
      const res = await fetch(`https://api.github.com/${path}`, {
        headers: { Accept: 'application/vnd.github+json' },
      });
      if (!res.ok) throw new Error(`GitHub API returned ${res.status} for ${path}`);
      return res.json();
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function releaseBlock(tagName, publishedAt, isLatest, repoSlug, releaseUrl, commits) {
      const commitsHtml = commits.length
        ? commits.map(c => `
            <li class="cl-commit">
              <a href="https://github.com/${repoSlug}/commit/${c.sha}" target="_blank" rel="noopener" class="cl-sha">${c.sha.slice(0, 7)}</a>
              <span class="cl-msg">${escapeHtml(c.message)}</span>
            </li>`).join('')
        : '<li class="cl-commit cl-empty"><span class="cl-msg">Initial release</span></li>';

      return `
        <div class="cl-release">
          <div class="cl-release-header">
            <a href="${releaseUrl}" target="_blank" rel="noopener" class="cl-tag">${escapeHtml(tagName)}</a>
            ${isLatest ? '<span class="cl-badge-latest">Latest</span>' : ''}
            <span class="cl-date">${formatDate(publishedAt)}</span>
          </div>
          <ul class="cl-commits">${commitsHtml}</ul>
        </div>`;
    }

    // CLI: release bodies contain a "## Changelog\n* <sha> <message>" list.
    async function renderCLI() {
      const releases = await ghFetch(`repos/${REPOS.cli}/releases?per_page=20`);
      return releases.map((r, i) =>
        releaseBlock(r.tag_name, r.published_at, i === 0, REPOS.cli, r.html_url, parseCliBody(r.body || ''))
      ).join('');
    }

    function parseCliBody(body) {
      return body.split('\n')
        .map(line => line.match(/^\*\s+([0-9a-f]{7,40})\s+(.+)$/))
        .filter(Boolean)
        .map(([, sha, message]) => ({ sha, message }));
    }

    // Plugin: release notes are empty; fetch commits between adjacent tags via the compare API.
    async function renderPlugin() {
      const releases = await ghFetch(`repos/${REPOS.plugin}/releases?per_page=20`);

      const commitLists = await Promise.all(
        releases.map((release, i) => {
          if (i === releases.length - 1) return Promise.resolve([]); // first ever release
          const base = releases[i + 1].tag_name;
          const head = release.tag_name;
          return ghFetch(`repos/${REPOS.plugin}/compare/${base}...${head}`)
            .then(data => data.commits.map(c => ({
              sha:     c.sha,
              message: c.commit.message.split('\n')[0],
            })))
            .catch(() => []);
        })
      );

      return releases.map((r, i) =>
        releaseBlock(r.tag_name, r.published_at, i === 0, REPOS.plugin, r.html_url, commitLists[i])
      ).join('');
    }

    // Registry: no releases — show recent commits, excluding automated package-publish merges.
    async function renderRegistry() {
      const commits = await ghFetch(`repos/${REPOS.registry}/commits?per_page=40`);

      const rows = commits
        .filter(c => !c.commit.message.startsWith('publish '))
        .map(c => `
          <div class="cl-reg-row">
            <div class="cl-reg-left">
              <a href="${c.html_url}" target="_blank" rel="noopener" class="cl-sha">${c.sha.slice(0, 7)}</a>
              <span class="cl-date">${formatDate(c.commit.committer.date)}</span>
            </div>
            <span class="cl-msg">${escapeHtml(c.commit.message.split('\n')[0])}</span>
          </div>`)
        .join('');

      return `<div class="cl-reg-list">${rows}</div>`;
    }

    showTab('cli');
  </script>

</body>
