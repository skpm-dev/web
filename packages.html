<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Packages - skpm</title>
  <meta name="description" content="Browse Skript packages available on the skpm registry." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <a href="/" class="logo">skpm</a>
    <nav>
      <a href="/packages.html" class="nav-active">Packages</a>
      <a href="/#install">Install</a>
      <a href="/#commands">Commands</a>
      <a href="/#developers">Developers</a>
      <a href="https://github.com/skpm-dev" target="_blank" rel="noopener" aria-label="GitHub">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
      </a>
    </nav>
  </header>

  <main>
    <div class="packages-hero">
      <div class="badge" style="margin-bottom: 18px;"><span class="dot"></span> Live from registry.skpm.org</div>
      <h1>Browse the registry.</h1>
      <p>Skript packages published to the skpm registry. Click any install command to copy.</p>
    </div>

    <div class="search-bar">
      <input id="search" type="text" placeholder="Search packages by name or description..." autocomplete="off" />
    </div>

    <div class="count-label" id="count">Loading…</div>
    <div class="packages-grid" id="grid">
      <div class="state-msg">Fetching packages from the registry…</div>
    </div>
  </main>

  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button id="modal-close" class="modal-close" aria-label="Close">&times;</button>
      <div id="modal-body">Loading…</div>
    </div>
  </div>

  <footer>
    <a href="/" class="logo">skpm</a>
    <div class="footer-links">
      <a href="/">Home</a>
      <a href="https://discord.gg/WTT6FSsjCR" target="_blank" rel="noopener">Discord</a>
      <a href="https://github.com/skpm-dev/plugin" target="_blank" rel="noopener">Plugin</a>
      <a href="https://github.com/skpm-dev/cli" target="_blank" rel="noopener">CLI</a>
      <a href="https://github.com/skpm-dev/registry" target="_blank" rel="noopener">Registry</a>
      <a href="https://github.com/skpm-dev" target="_blank" rel="noopener">GitHub</a>
    </div>
  </footer>

  <script>
    const REGISTRY = 'https://registry.skpm.org';
    let allPackages = [];

    async function load() {
      try {
        const res = await fetch(`${REGISTRY}/packages`);
        if (!res.ok) throw new Error(`Registry returned ${res.status}`);
        allPackages = await res.json();
        render(allPackages);
      } catch (e) {
        document.getElementById('grid').innerHTML =
          `<div class="state-msg">Could not load packages: ${e.message}</div>`;
        document.getElementById('count').textContent = '';
      }
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    function fmtDownloads(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
      return String(n);
    }

    function render(packages) {
      const grid = document.getElementById('grid');
      const count = document.getElementById('count');

      if (!packages || packages.length === 0) {
        grid.innerHTML = '<div class="state-msg">No packages found.</div>';
        count.textContent = '';
        return;
      }

      count.textContent = `${packages.length} package${packages.length === 1 ? '' : 's'}`;
      grid.innerHTML = packages.map(pkg => `
        <div class="pkg-card" data-name="${escapeHtml(pkg.name)}" role="button" tabindex="0" style="cursor:pointer">
          <div class="pkg-header">
            <span class="pkg-name">${escapeHtml(pkg.name)}</span>
            <span class="pkg-version">v${escapeHtml(pkg.latest)}</span>
          </div>
          <div class="pkg-desc">${escapeHtml(pkg.description || '')}</div>
          <div class="pkg-meta">
            <span class="pkg-author">by ${escapeHtml(pkg.author)}</span>
            <span class="pkg-downloads">${fmtDownloads(pkg.downloads)} downloads</span>
          </div>
          <div class="pkg-install" title="Click to copy" data-cmd="/skpm install ${escapeHtml(pkg.name)}">/skpm install ${escapeHtml(pkg.name)}</div>
        </div>
      `).join('');

      grid.querySelectorAll('.pkg-install').forEach(el => {
        el.addEventListener('click', e => {
          e.stopPropagation();
          const cmd = el.getAttribute('data-cmd');
          if (navigator.clipboard) {
            navigator.clipboard.writeText(cmd).then(() => {
              const orig = el.textContent;
              el.textContent = '✓ copied';
              setTimeout(() => { el.textContent = orig; }, 1200);
            });
          }
        });
      });

      grid.querySelectorAll('.pkg-card').forEach(card => {
        card.addEventListener('click', () => openModal(card.dataset.name));
        card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openModal(card.dataset.name); });
      });
    }

    // ── Modal ────────────────────────────────────────────────────────────────

    const overlay = document.getElementById('modal-overlay');
    const modalBody = document.getElementById('modal-body');

    document.getElementById('modal-close').addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    function openModal(name) {
      modalBody.innerHTML = '<div class="modal-loading">Loading…</div>';
      overlay.hidden = false;
      document.body.style.overflow = 'hidden';
      fetchAndRenderModal(name);
    }

    function closeModal() {
      overlay.hidden = true;
      document.body.style.overflow = '';
    }

    async function fetchAndRenderModal(name) {
      try {
        const res = await fetch(`${REGISTRY}/packages/${encodeURIComponent(name)}`);
        if (!res.ok) throw new Error(`Registry returned ${res.status}`);
        const pkg = await res.json();
        renderModal(pkg);
      } catch (e) {
        modalBody.innerHTML = `<div class="modal-loading">Failed to load: ${escapeHtml(e.message)}</div>`;
      }
    }

    function renderModal(pkg) {
      const versions = Object.entries(pkg.versions || {})
        .sort(([a], [b]) => semverCmp(b, a));

      const latestEntry = pkg.versions?.[pkg.latest] ?? versions[0]?.[1] ?? null;

      const dlStr = `<span class="modal-stat"><span class="modal-stat-val">${fmtDownloads(pkg.downloads)}</span><span class="modal-stat-label">downloads</span></span>`;

      const requirementsHtml = latestEntry ? buildRequirements(latestEntry) : '';

      const versionsHtml = versions.map(([v, entry]) => `
        <div class="mv-row ${entry.yanked ? 'mv-yanked' : ''}">
          <span class="mv-ver">${escapeHtml(v)}${v === pkg.latest ? ' <span class="mv-latest">latest</span>' : ''}${entry.yanked ? ' <span class="mv-yank-badge">yanked</span>' : ''}</span>
          ${entry.yanked && entry.yank_reason ? `<span class="mv-yank-reason">${escapeHtml(entry.yank_reason)}</span>` : ''}
        </div>
      `).join('');

      const filesHtml = latestEntry?.files?.length ? `
        <div class="modal-section">
          <div class="modal-section-title">Files</div>
          ${latestEntry.files.map(f => `
            <div class="mf-row">
              <span class="mf-name">${escapeHtml(f.name)}</span>
              <span class="mf-hash" title="${escapeHtml(f.sha256)}">${escapeHtml((f.sha256 || '').slice(0, 12))}…</span>
            </div>
          `).join('')}
        </div>
      ` : '';

      const installCmd = `/skpm install ${escapeHtml(pkg.name)}`;

      modalBody.innerHTML = `
        <div class="modal-header">
          <div>
            <div class="modal-title-row">
              <span id="modal-title" class="modal-pkg-name">${escapeHtml(pkg.name)}</span>
              <span class="pkg-version">v${escapeHtml(pkg.latest)}</span>
            </div>
            <div class="modal-author">by ${escapeHtml(pkg.author)}</div>
          </div>
          ${dlStr}
        </div>
        ${pkg.description ? `<div class="modal-desc">${escapeHtml(pkg.description)}</div>` : ''}
        <div class="modal-install" title="Click to copy" data-cmd="${installCmd}">${installCmd}</div>
        ${requirementsHtml}
        ${filesHtml}
        ${versions.length > 1 ? `
        <div class="modal-section">
          <div class="modal-section-title">All versions</div>
          <div class="mv-list">${versionsHtml}</div>
        </div>` : ''}
      `;

      modalBody.querySelector('.modal-install')?.addEventListener('click', el => {
        const cmd = el.currentTarget.getAttribute('data-cmd');
        if (navigator.clipboard) {
          navigator.clipboard.writeText(cmd).then(() => {
            const t = el.currentTarget;
            const orig = t.textContent;
            t.textContent = '✓ copied';
            setTimeout(() => { t.textContent = orig; }, 1200);
          });
        }
      });
    }

    function buildRequirements(entry) {
      const rows = [];
      if (entry.skript) rows.push(['Skript', entry.skript]);
      if (entry.minecraft) rows.push(['Minecraft', entry.minecraft]);
      if (entry.addons && Object.keys(entry.addons).length) {
        for (const [addon, ver] of Object.entries(entry.addons)) {
          rows.push([addon, ver]);
        }
      }
      if (!rows.length) return '';
      return `
        <div class="modal-section">
          <div class="modal-section-title">Requirements</div>
          <div class="req-grid">
            ${rows.map(([k, v]) => `
              <div class="req-row">
                <span class="req-key">${escapeHtml(k)}</span>
                <span class="req-val">${escapeHtml(v)}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function semverCmp(a, b) {
      const pa = a.split('.').map(Number);
      const pb = b.split('.').map(Number);
      for (let i = 0; i < 3; i++) {
        if ((pa[i] ?? 0) !== (pb[i] ?? 0)) return (pa[i] ?? 0) - (pb[i] ?? 0);
      }
      return 0;
    }

    document.getElementById('search').addEventListener('input', e => {
      const q = e.target.value.trim().toLowerCase();
      if (!q) { render(allPackages); return; }
      render(allPackages.filter(p =>
        p.name.toLowerCase().includes(q) ||
        (p.description || '').toLowerCase().includes(q)
      ));
    });

    load();
  </script>

</body>
</html>
